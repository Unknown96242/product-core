stages:
  - build
  - publish

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn clean compile -DskipTests
  only:
    - main
    - develop

publish:
  stage: publish
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn deploy -s ci_settings.xml -DskipTests
  only:
    - main
    - develop