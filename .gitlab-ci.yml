stages:
  - build
  - publish

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn clean compile -DskipTests
  only:
    - main
    - develop

publish:
  stage: publish
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn deploy -DskipTests -DaltDeploymentRepository=gitlab-maven::default::https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/maven
  only:
    - main
    - develop